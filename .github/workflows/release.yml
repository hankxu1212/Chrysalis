name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_ext: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_ext: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_ext: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (linux musl targets)
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5
      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} -p crys-cli
          else
            cargo build --release --target ${{ matrix.target }} -p crys-cli
          fi
      - name: Smoke test (--version)
        if: matrix.os != 'ubuntu-latest' || !matrix.cross
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ./target/${{ matrix.target }}/release/crys.exe --version
          else
            ./target/${{ matrix.target }}/release/crys --version
          fi
      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          NAME="crys-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/crys.exe dist/
            (cd dist && 7z a "${NAME}.zip" crys.exe)
            echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            cp target/${{ matrix.target }}/release/crys dist/
            tar -czf "dist/${NAME}.tar.gz" -C dist crys
            echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crys-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd artifacts
          shasum -a 256 * > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true
